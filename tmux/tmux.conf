source-file ~/bin/tmux/tmux.reset.conf

# Terminal capabilities
set-option -g default-terminal 'screen-256color'
set-option -g terminal-overrides ',xterm-256color:RGB'
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Keep the new Ctrl-a workflow, but preserve the old Ctrl-Space muscle memory.
set -g prefix ^A
set -g prefix2 C-Space
bind C-Space send-prefix -2

# Core behavior carried over from the old config
set -g base-index 1              # start indexing windows at 1 instead of 0
setw -g pane-base-index 1        # start pane numbering at 1 too
set -g allow-rename on
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g extended-keys on
set -g extended-keys-format csi-u
set -g focus-events on
set -g history-limit 1000000     # increase history size
set -g mouse on
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
set -g set-titles on
set -g status-position top       # macOS / darwin style
setw -g aggressive-resize on
setw -g mode-keys vi
setw -g monitor-activity on
set -g bell-action any
set -g visual-bell off
set -g visual-activity off
set -g default-terminal "${TERM}"
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

# Familiar navigation and pane/window management from the old config
bind -r n next-window
bind -r p previous-window
bind C-p previous-window
bind C-n next-window
bind Space last-window
bind ^ switch-client -l
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

is_vim='echo "#{pane_current_command}" | grep -iqE "(^|/)g?(view|n?vim?)(diff)?$"'
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

if-shell 'command -v pbcopy >/dev/null 2>&1' \
    'bind-key y run-shell "tmux save-buffer - | pbcopy" \; display-message "Copied tmux buffer to system clipboard"' \
    'if-shell "command -v xclip >/dev/null 2>&1" \
        "bind-key y run-shell \"tmux save-buffer - | xclip -selection clipboard\" \; display-message \"Copied tmux buffer to system clipboard\"" \
        "bind-key y display-message \"No clipboard integration available (install pbcopy or xclip)\""'

set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'omerxx/catppuccin-tmux' # My fork that holds the meetings script bc I'm lazy af
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-bind 'p'
set -g @floax-change-path 'true'
set -g @sessionx-bind-zo-new-window 'ctrl-y'
set -g @sessionx-auto-accept 'off'
set -g @sessionx-custom-paths '/Users/mwamodo/bin'
set -g @sessionx-bind 's'
set -g @sessionx-x-path '~/bin'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-custom-paths-subdirectories 'false'
set -g @sessionx-filter-current 'false'
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"
set -g @catppuccin_status_modules_right "directory todos meetings date_time"
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_directory_text "#{b:pane_current_path}"
set -g @catppuccin_todos_text "#(bash $HOME/bin/tmux/scripts/todos.sh '#{pane_current_path}')"
set -g @catppuccin_meetings_text "#(bash $HOME/bin/tmux/scripts/cal.sh)"
set -g @catppuccin_date_time_text "%H:%M"

run '~/bin/tmux/plugins/tpm/tpm'
